<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VfB Brüstring – Videoliste</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      border-bottom: 2px solid #e30613;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
    }

    header .subtitle {
      font-size: 0.85rem;
      color: #999;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: #e30613;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.75rem;
      color: #fff;
      flex-shrink: 0;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: #e30613; }

    .count-badge {
      font-size: 0.85rem;
      color: #999;
      white-space: nowrap;
    }

    #loading {
      text-align: center;
      padding: 4rem;
      color: #666;
      font-size: 1rem;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #e30613;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      background: #2a0808;
      border: 1px solid #e30613;
      border-radius: 8px;
      padding: 1.5rem;
      color: #ff6b6b;
      text-align: center;
    }

    #error pre {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #cc4444;
      white-space: pre-wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #e30613;
      box-shadow: 0 8px 24px rgba(227, 6, 19, 0.2);
    }

    .thumbnail-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #111;
      overflow: hidden;
    }

    .thumbnail-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumbnail-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 2rem;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0);
      transition: background 0.15s;
    }

    .card:hover .play-overlay {
      background: rgba(0,0,0,0.35);
    }

    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(227,6,19,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.15s, transform 0.15s;
    }

    .card:hover .play-btn {
      opacity: 1;
      transform: scale(1);
    }

    .play-btn svg {
      width: 22px;
      height: 22px;
      fill: #fff;
      margin-left: 3px;
    }

    .duration-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-variant-numeric: tabular-nums;
    }

    .card-body {
      padding: 0.9rem 1rem;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.35;
      color: #f0f0f0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      margin-top: 0.4rem;
      font-size: 0.75rem;
      color: #666;
    }

    .empty {
      text-align: center;
      padding: 4rem;
      color: #555;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">VfB</div>
  <div>
    <h1>Videoliste</h1>
    <div class="subtitle">100 Jahre Brüstring</div>
  </div>
</header>

<main>
  <div class="toolbar">
    <input
      class="search-input"
      type="search"
      id="searchInput"
      placeholder="Videos durchsuchen..."
      oninput="filterVideos()"
    >
    <span class="count-badge" id="countBadge"></span>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    Videos werden geladen…
  </div>

  <div id="error"></div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">Keine Videos gefunden.</div>
</main>

<script>
  // API-Key und Projekt-ID werden serverseitig verwaltet (.env)
  // Der Browser spricht nur den lokalen Proxy an.

  let allVideos = [];

  async function apiFetch(path) {
    const response = await fetch(path);
    if (!response.ok) {
      throw new Error(`API-Fehler ${response.status}: ${response.statusText}`);
    }
    return response.json();
  }

  function formatDuration(seconds) {
    if (!seconds && seconds !== 0) return "";
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    return `${m}:${String(s).padStart(2,"0")}`;
  }

  function formatDate(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr);
    if (isNaN(d)) return "";
    return d.toLocaleDateString("de-DE", { day:"2-digit", month:"2-digit", year:"numeric" });
  }

  function renderCard(video) {
    const fileId   = video.FileId || video.Id || "";
    const title    = video.FileName || video.Title || `Video ${fileId}`;
    const thumb    = video.ThumbnailUrl || video.ThumbnailSmallUrl || video.ThumbUrl || "";
    const duration = formatDuration(video.Duration);
    const date     = formatDate(video.CreatedAt || video.Created || "");

    const card = document.createElement("a");
    card.className = "card";
    card.href = `video.html?fileId=${encodeURIComponent(fileId)}&title=${encodeURIComponent(title)}`;

    card.innerHTML = `
      <div class="thumbnail-wrap">
        ${thumb
          ? `<img src="${thumb}" alt="${title.replace(/"/g,'&quot;')}" loading="lazy">`
          : `<div class="thumbnail-placeholder">&#9654;</div>`
        }
        <div class="play-overlay">
          <div class="play-btn">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
        </div>
        ${duration ? `<span class="duration-badge">${duration}</span>` : ""}
      </div>
      <div class="card-body">
        <div class="card-title">${title}</div>
        ${date ? `<div class="card-meta">${date}</div>` : ""}
      </div>
    `;
    return card;
  }

  function filterVideos() {
    const query = document.getElementById("searchInput").value.toLowerCase().trim();
    const grid  = document.getElementById("grid");
    const empty = document.getElementById("empty");
    grid.innerHTML = "";
    const filtered = query
      ? allVideos.filter(v => (v.FileName || v.Title || "").toLowerCase().includes(query))
      : allVideos;
    document.getElementById("countBadge").textContent =
      filtered.length === allVideos.length
        ? `${allVideos.length} Videos`
        : `${filtered.length} von ${allVideos.length} Videos`;
    if (filtered.length === 0) {
      empty.style.display = "block";
    } else {
      empty.style.display = "none";
      filtered.forEach(v => grid.appendChild(renderCard(v)));
    }
  }

  async function loadVideos() {
    const loading = document.getElementById("loading");
    const errEl   = document.getElementById("error");
    try {
      const data = await apiFetch("/api/videos");
      // API kann Array oder Objekt mit .Files / .Items zurückgeben
      allVideos = Array.isArray(data) ? data : (data.Files || data.Items || data.Data || []);
      loading.style.display = "none";
      filterVideos();
    } catch (err) {
      loading.style.display = "none";
      errEl.style.display   = "block";
      errEl.innerHTML = `
        <strong>Fehler beim Laden der Videos</strong>
        <pre>${err.message}</pre>
        <p style="margin-top:0.5rem;font-size:0.8rem;color:#888;">
          Bitte SDN_API_KEY und SDN_PROJECT_ID in der .env-Datei prüfen und den Server neu starten.
        </p>`;
    }
  }

  loadVideos();
</script>
</body>
</html>
